<!DOCTYPE html>
<html lang="en">
<head>
<meta name="description" content="Better Metal Roofs offers premium metal roofing installation and ice dam prevention in Ware, MA, and across New England. 50+ years of durability guaranteed.">
<meta name="keywords" content="metal roofing Ware MA, New England roofing contractors, ice dam prevention, heated roof systems, standing seam metal roof">
<meta name="author" content="Better Metal Roofs">

<meta property="og:type" content="website">
<meta property="og:url" content="https://bettermetalroofs.com/">
<meta property="og:title" content="Better Metal Roofs | Premium Roofing & Ice Dam Prevention">
<meta property="og:description" content="Expert metal roof installation with 20+ years of experience. Protecting New England homes from the harshest winters.">
<meta property="og:image" content="IMG_1274.jpg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Metal Roofing Estimate | Ware, MA | Better Metal Roofs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, .nav-logo { font-family: 'Oswald', sans-serif; }
        .bg-yellow { background-color: #f2c144; }
    </style>
</head>
<body class="bg-zinc-50 text-black antialiased">

<header class="flex justify-between items-center px-6 py-4 bg-white border-b border-gray-100">
    <a href="index.html" class="flex items-center gap-2">
        <div class="w-10 h-10 bg-black flex items-center justify-center">
            <span class="text-[#f2c144] font-black text-xs">BMR</span>
        </div>
        <span class="nav-logo uppercase font-bold text-xl tracking-tighter">Better Metal Roofs</span>
    </a>
    <a href="index.html" class="text-[10px] font-bold uppercase tracking-widest hover:text-[#f2c144]">← Back to Home</a>
</header>

    <main class="max-w-3xl mx-auto py-16 px-6">
        <div class="bg-white shadow-2xl p-8 md:p-12 border-t-8 border-[#f2c144]">
            <h1 class="text-4xl font-bold uppercase mb-2">Request Your Quote</h1>
            <p class="text-gray-500 text-sm mb-10">Provide your project details below and our team will reach out within 48 hours.</p>

            <form name="quote-request" method="POST" action="/success.html" data-netlify="true" class="space-y-8">
                <input type="hidden" name="form-name" value="quote-request" />

                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-[10px] font-black uppercase tracking-widest mb-2">Full Name</label>
                        <input type="text" name="full-name" required class="w-full border-2 border-gray-100 p-3 focus:border-[#f2c144] outline-none transition-all" placeholder="John Doe">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black uppercase tracking-widest mb-2">Phone Number</label>
                        <input type="tel" name="phone" required class="w-full border-2 border-gray-100 p-3 focus:border-[#f2c144] outline-none transition-all" placeholder="(413) 000-0000">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest mb-2">Installation Address</label>
                    <input type="text" name="address" required class="w-full border-2 border-gray-100 p-3 focus:border-[#f2c144] outline-none transition-all" placeholder="Street Address, City, State">
                </div>

                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-[10px] font-black uppercase tracking-widest mb-2">Property Type</label>
                        <select name="property-type" class="w-full border-2 border-gray-100 p-3 focus:border-[#f2c144] outline-none bg-white">
                            <option value="residential">Residential</option>
                            <option value="commercial">Commercial</option>
                            <option value="industrial">Industrial</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black uppercase tracking-widest mb-2">Estimated Square Footage</label>
                        <input type="number" name="sq-footage" class="w-full border-2 border-gray-100 p-3 focus:border-[#f2c144] outline-none transition-all" placeholder="e.g. 2500">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest mb-2">Service Needed</label>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-2">
                        <label class="flex items-center gap-3 p-3 border-2 border-gray-50 cursor-pointer hover:bg-gray-50 transition-all">
                            <input type="checkbox" name="services" value="new-installation" class="accent-[#f2c144]"> <span class="text-xs font-bold uppercase">New Installation</span>
                        </label>
                        <label class="flex items-center gap-3 p-3 border-2 border-gray-50 cursor-pointer hover:bg-gray-50 transition-all">
                            <input type="checkbox" name="services" value="roof-repair" class="accent-[#f2c144]"> <span class="text-xs font-bold uppercase">Roof Repair</span>
                        </label>
                        <label class="flex items-center gap-3 p-3 border-2 border-gray-50 cursor-pointer hover:bg-gray-50 transition-all">
                            <input type="checkbox" name="services" value="heated-roof-system" class="accent-[#f2c144]"> <span class="text-xs font-bold uppercase">Heated Roof System</span>
                        </label>
                        <label class="flex items-center gap-3 p-3 border-2 border-gray-50 cursor-pointer hover:bg-gray-50 transition-all">
                            <input type="checkbox" name="services" value="ice-dam-retrofit" class="accent-[#f2c144]"> <span class="text-xs font-bold uppercase">Ice-Dam Retrofit</span>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black uppercase tracking-widest mb-2">Additional Details</label>
                    <textarea name="details" rows="4" class="w-full border-2 border-gray-100 p-3 focus:border-[#f2c144] outline-none transition-all" placeholder="Tell us about your roof pitch, current material, or specific concerns..."></textarea>
                </div>

                <button type="submit" class="w-full bg-[#f2c144] text-black font-black uppercase py-4 tracking-[0.2em] hover:bg-black hover:text-white transition-all shadow-xl">
                    Submit Quote Request
                </button>
            </form>
        </div>
    </main>

    <footer class="text-center py-10 opacity-30">
        <p class="text-[8px] tracking-[0.4em] uppercase font-black">© 2026 BETTER METAL ROOFS. WARE, MA.</p>
    </footer>

</body>
</html>
